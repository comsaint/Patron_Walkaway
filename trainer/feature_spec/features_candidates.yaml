version: "2.0"
spec_id: "walkaway_features_v2_template"
description: "Template feature spec for Patron Walkaway Predictor (Track Profile / Track LLM / Track Human)."

tracks_enabled:
  track_profile: true
  track_llm: true
  track_human: true

execution:
  engine: "duckdb"
  time_column: "payout_complete_dtm"
  partition_key: "canonical_id"
  order_by: "payout_complete_dtm ASC, bet_id ASC"
  timezone_policy: "hk_local_tz_naive"

inference_state:
  history_window_min: 75          # 必須 >= track_llm.guardrails.max_window_minutes + buffer
  history_buffer_min: 15
  cold_start_backfill: true
  cold_start_suspend_alerts: true

guardrails:
  disallow_sql_keywords_in_expressions: ["SELECT", "FROM", "JOIN", "UNION", "WITH"]
  allowed_aggregate_functions: ["COUNT", "SUM", "AVG", "MIN", "MAX", "STDDEV_SAMP"]
  allowed_window_functions: ["LAG"]
  allowed_scalar_functions: ["EPOCH", "OVER"]
  track_llm_allowed_columns:
    - bet_id
    - canonical_id
    - payout_complete_dtm
    - wager
    - payout_odds
    - base_ha
    - status
    - is_back_bet
    - position_idx
    - table_id

track_llm:
  name: "Track LLM"
  source_table: "t_bet"
  data_scope: "bet_only"
  enabled: true

  guardrails:
    max_window_minutes: 60
    disallow_following: true

  candidates:
    # ==== 節奏 / 頻率 (Pace) ====
    - feature_id: "bets_cnt_w5m"
      type: "window"
      dtype: "int"
      description: "過去 5 分鐘下注次數"
      rationale: "近期下注急遽下降為離場前兆；文獻 inter-bet interval 拉長為關鍵信號。"
      expression: "COUNT(bet_id)"
      window_frame: "RANGE BETWEEN INTERVAL 5 MINUTE PRECEDING AND CURRENT ROW"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0, max: 1000000 }
      reason_code_category: "BETTING_PACE_DROPPING"

    - feature_id: "bets_cnt_w15m"
      type: "window"
      dtype: "int"
      description: "過去 15 分鐘下注次數"
      rationale: "下注頻率下降通常先於離場。"
      expression: "COUNT(bet_id)"
      window_frame: "RANGE BETWEEN INTERVAL 15 MINUTE PRECEDING AND CURRENT ROW"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0, max: 1000000 }
      reason_code_category: "BETTING_PACE_DROPPING"

    - feature_id: "bets_cnt_w30m"
      type: "window"
      dtype: "int"
      description: "過去 30 分鐘下注次數"
      rationale: "較長窗口基線，供 pace_drop_ratio 計算衰減率。"
      expression: "COUNT(bet_id)"
      window_frame: "RANGE BETWEEN INTERVAL 30 MINUTE PRECEDING AND CURRENT ROW"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0, max: 1000000 }
      reason_code_category: "BETTING_PACE_DROPPING"

    - feature_id: "pace_drop_ratio"
      type: "derived"
      dtype: "float"
      description: "近期下注節奏衰減率 (w5m/w30m)"
      rationale: "若遠低於 0.167 代表最近 5 分鐘頻率急遽下降，即將離場。"
      depends_on: ["bets_cnt_w5m", "bets_cnt_w30m"]
      expression: "CAST(bets_cnt_w5m AS DOUBLE) / NULLIF(bets_cnt_w30m, 0)"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0.0, max: 1.0 }
      reason_code_category: "BETTING_PACE_DROPPING"

    - feature_id: "prev_bet_gap_min"
      type: "derived"
      dtype: "float"
      description: "與上一筆下注間隔（分鐘）"
      rationale: "文獻 inter-bet interval 拉長為離場前兆；可單獨或與節奏特徵搭配。"
      expression: "(epoch(payout_complete_dtm) - epoch(LAG(payout_complete_dtm, 1) OVER (PARTITION BY canonical_id ORDER BY payout_complete_dtm ASC, bet_id ASC))) / 60.0"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0.0, max: 10080.0 }
      reason_code_category: "BETTING_PACE_DROPPING"

    - feature_id: "pace_drop_ratio_w15m_w30m"
      type: "derived"
      dtype: "float"
      description: "近期下注節奏衰減率 (w15m/w30m)"
      rationale: "多時間尺度衰減，與 pace_drop_ratio (w5m/w30m) 互補。"
      depends_on: ["bets_cnt_w15m", "bets_cnt_w30m"]
      expression: "CAST(bets_cnt_w15m AS DOUBLE) / NULLIF(bets_cnt_w30m, 0)"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0.0, max: 2.0 }
      reason_code_category: "BETTING_PACE_DROPPING"

    # ==== 金額動態 (Wager) ====
    - feature_id: "wager_sum_w30m"
      type: "window"
      dtype: "float"
      description: "過去 30 分鐘下注總額"
      expression: "SUM(wager)"
      window_frame: "RANGE BETWEEN INTERVAL 30 MINUTE PRECEDING AND CURRENT ROW"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0.0, max: 500000000.0 }
      reason_code_category: "LOW_ACTIVITY_RECENTLY"

    - feature_id: "wager_avg_w15m"
      type: "window"
      dtype: "float"
      description: "過去 15 分鐘平均注碼"
      rationale: "平均注碼下降代表保守化、即將離場。"
      expression: "AVG(wager)"
      window_frame: "RANGE BETWEEN INTERVAL 15 MINUTE PRECEDING AND CURRENT ROW"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0.0, max: 500000000.0 }
      reason_code_category: "LOW_ACTIVITY_RECENTLY"

    - feature_id: "wager_avg_w5m"
      type: "window"
      dtype: "float"
      description: "過去 5 分鐘平均注碼"
      rationale: "短窗平均注碼，供短中窗比值與注碼收縮偵測。"
      expression: "AVG(wager)"
      window_frame: "RANGE BETWEEN INTERVAL 5 MINUTE PRECEDING AND CURRENT ROW"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0.0, max: 500000000.0 }
      reason_code_category: "LOW_ACTIVITY_RECENTLY"

    - feature_id: "wager_w5m_over_w15m"
      type: "derived"
      dtype: "float"
      description: "最近 5 分鐘 vs 15 分鐘平均注碼比（<1 代表注碼收縮）"
      rationale: "捕捉注碼由中期基準向短期快速收縮的趨勢。"
      depends_on: ["wager_avg_w5m", "wager_avg_w15m"]
      expression: "CAST(wager_avg_w5m AS DOUBLE) / NULLIF(wager_avg_w15m, 0)"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0.0, max: 10.0 }
      reason_code_category: "LOW_ACTIVITY_RECENTLY"

    - feature_id: "wager_slope_w10bets"
      type: "derived"
      dtype: "float"
      description: "最近 10 筆注碼趨勢斜率（負值代表減碼）"
      rationale: "以近 10 筆 wager 變化率近似注碼方向性，補齊僅有水位/波動的限制。"
      expression: "(CAST(wager AS DOUBLE) - CAST(LAG(wager, 10) OVER (PARTITION BY canonical_id ORDER BY payout_complete_dtm ASC, bet_id ASC) AS DOUBLE)) / 10.0"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: -500000000.0, max: 500000000.0 }
      reason_code_category: "LOW_ACTIVITY_RECENTLY"

    - feature_id: "wager_std_w15m"
      type: "window"
      dtype: "float"
      description: "過去 15 分鐘注碼標準差"
      rationale: "文獻：注碼波動性為最強單一預測因子；波動收斂可能代表放棄。"
      expression: "STDDEV_SAMP(wager)"
      window_frame: "RANGE BETWEEN INTERVAL 15 MINUTE PRECEDING AND CURRENT ROW"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0.0, max: 1000000000.0 }
      reason_code_category: "LOW_ACTIVITY_RECENTLY"

    - feature_id: "wager_recent_vs_session_avg"
      type: "derived"
      dtype: "float"
      description: "近期平均注額 vs 當次 session 平均注額比"
      rationale: "比值 <1 表示最近變保守，常伴隨即將離場。"
      depends_on: ["wager_avg_w15m", "avg_wager_sofar"]
      expression: "wager_avg_w15m / NULLIF(avg_wager_sofar, 0)"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0.0, max: 10.0 }
      reason_code_category: "LOW_ACTIVITY_RECENTLY"

    - feature_id: "wager_max_w15m"
      type: "window"
      dtype: "float"
      description: "過去 15 分鐘最大單筆注碼"
      rationale: "與平均比較可看出追趕損失行為。"
      expression: "MAX(wager)"
      window_frame: "RANGE BETWEEN INTERVAL 15 MINUTE PRECEDING AND CURRENT ROW"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0.0, max: 500000000.0 }
      reason_code_category: "LOW_ACTIVITY_RECENTLY"

    - feature_id: "prev_wager"
      type: "lag"
      dtype: "float"
      description: "上一筆下注注碼"
      expression: "LAG(wager, 1)"
      postprocess:
        fill: { strategy: "zero" }

    # ==== 勝負結果 (Outcome) ====
    - feature_id: "lose_cnt_w15m"
      type: "window"
      dtype: "int"
      description: "過去 15 分鐘輸局次數"
      rationale: "累積損失驅動離場；文獻累積損失導致減注與離場。"
      expression: "SUM(CASE WHEN status = 'LOSE' THEN 1 ELSE 0 END)"
      window_frame: "RANGE BETWEEN INTERVAL 15 MINUTE PRECEDING AND CURRENT ROW"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0, max: 10000 }
      reason_code_category: "LOSS_STREAK"

    - feature_id: "win_cnt_w15m"
      type: "window"
      dtype: "int"
      description: "過去 15 分鐘贏局次數"
      rationale: "勝負結果的近期統計，供勝率與行為轉折特徵使用。"
      expression: "SUM(CASE WHEN status = 'WIN' THEN 1 ELSE 0 END)"
      window_frame: "RANGE BETWEEN INTERVAL 15 MINUTE PRECEDING AND CURRENT ROW"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0, max: 10000 }
      reason_code_category: "WIN_COUNT"

    - feature_id: "win_rate_w15m"
      type: "derived"
      dtype: "float"
      description: "過去 15 分鐘勝率"
      rationale: "文獻：贏錢後 session 反而較短（趁贏走人）；勝率可捕捉此差異。"
      depends_on: ["win_cnt_w15m", "bets_cnt_w15m"]
      expression: "CAST(win_cnt_w15m AS DOUBLE) / NULLIF(bets_cnt_w15m, 0)"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0.0, max: 1.0 }
      reason_code_category: "WIN_RATE"

    - feature_id: "push_cnt_w15m"
      type: "window"
      dtype: "int"
      description: "過去 15 分鐘 PUSH（和局）次數"
      rationale: "補齊 WIN/LOSE 之外的局態，捕捉卡住不前的心理狀態。"
      expression: "SUM(CASE WHEN status = 'PUSH' THEN 1 ELSE 0 END)"
      window_frame: "RANGE BETWEEN INTERVAL 15 MINUTE PRECEDING AND CURRENT ROW"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0, max: 10000 }
      reason_code_category: "LOSS_STREAK"

    - feature_id: "non_win_rate_w15m"
      type: "derived"
      dtype: "float"
      description: "過去 15 分鐘非 WIN 率（LOSE+PUSH）"
      rationale: "把 PUSH 顯式納入，補強僅看 lose/win 的盲點。"
      depends_on: ["lose_cnt_w15m", "push_cnt_w15m", "bets_cnt_w15m"]
      expression: "CAST((lose_cnt_w15m + push_cnt_w15m) AS DOUBLE) / NULLIF(bets_cnt_w15m, 0)"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0.0, max: 1.0 }
      reason_code_category: "LOSS_STREAK"

    - feature_id: "prev_status"
      type: "lag"
      dtype: "str"
      screening_eligible: false
      description: "上一把結果狀態（WIN/LOSE/PUSH/…）"
      rationale: "上一把輸贏常是行為轉折與離場觸發事件。"
      expression: "LAG(status, 1)"

    - feature_id: "prev_bet_was_loss"
      type: "derived"
      dtype: "int"
      screening_eligible: false
      description: "上一把是否輸錢 (1=是 0=否)"
      rationale: "即時損失為離場觸發事件。"
      depends_on: ["prev_status"]
      expression: "CASE WHEN prev_status = 'LOSE' THEN 1 ELSE 0 END"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0, max: 1 }
      reason_code_category: "LOSS_STREAK"

    # ==== 風險偏好 (Risk) ====
    - feature_id: "avg_payout_odds_w15m"
      type: "window"
      dtype: "float"
      description: "過去 15 分鐘平均賠率"
      rationale: "百家樂研究：連贏轉向 longshot、連輸變保守。"
      expression: "AVG(payout_odds)"
      window_frame: "RANGE BETWEEN INTERVAL 15 MINUTE PRECEDING AND CURRENT ROW"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0.0, max: 1000000.0 }
      reason_code_category: "RISK_APPETITE"

    - feature_id: "back_bet_cnt_w20"
      type: "window"
      dtype: "int"
      description: "近 20 把中 back bet 次數"
      rationale: "投注類型轉變反映心態變化；供 back_bet_pct_w20 計算比例。"
      expression: "SUM(is_back_bet)"
      window_frame: "ROWS BETWEEN 20 PRECEDING AND CURRENT ROW"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0, max: 1000000 }
      reason_code_category: "RISK_APPETITE"

    - feature_id: "bets_cnt_w20"
      type: "window"
      dtype: "int"
      screening_eligible: false
      description: "近 20 把下注次數"
      rationale: "供 back_bet_pct_w20 計算比例。"
      expression: "COUNT(*)"
      window_frame: "ROWS BETWEEN 20 PRECEDING AND CURRENT ROW"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0, max: 1000000 }
      reason_code_category: "BETTING_PACE_DROPPING"

    - feature_id: "back_bet_pct_w20"
      type: "derived"
      dtype: "float"
      description: "近 20 把中 back bet 佔比 (%)"
      rationale: "投注類型轉變反映心態變化。"
      depends_on: ["back_bet_cnt_w20", "bets_cnt_w20"]
      expression: "100.0 * CAST(back_bet_cnt_w20 AS DOUBLE) / NULLIF(bets_cnt_w20, 0)"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0.0, max: 100.0 }
      reason_code_category: "RISK_APPETITE"

    # ==== 時段 / 位置 (Context) ====
    - feature_id: "hour_of_day"
      type: "derived"
      dtype: "int"
      description: "下注發生的小時（0–23）"
      expression: "date_part('hour', payout_complete_dtm)"
      postprocess:
        fill: { strategy: "zero" }

    - feature_id: "position_min_w30m"
      type: "window"
      dtype: "int"
      screening_eligible: false
      description: "過去 30 分鐘最小 position_idx"
      rationale: "用於判斷是否在近 30 分鐘內換位（避免 window-on-window nesting）。"
      expression: "MIN(position_idx)"
      window_frame: "RANGE BETWEEN INTERVAL 30 MINUTE PRECEDING AND CURRENT ROW"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0, max: 1000 }
      reason_code_category: "ENGAGEMENT"

    - feature_id: "position_max_w30m"
      type: "window"
      dtype: "int"
      screening_eligible: false
      description: "過去 30 分鐘最大 position_idx"
      rationale: "用於判斷是否在近 30 分鐘內換位（避免 window-on-window nesting）。"
      expression: "MAX(position_idx)"
      window_frame: "RANGE BETWEEN INTERVAL 30 MINUTE PRECEDING AND CURRENT ROW"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0, max: 1000 }
      reason_code_category: "ENGAGEMENT"

    - feature_id: "position_moved_w30m"
      type: "derived"
      dtype: "int"
      description: "過去 30 分鐘是否換位 (1=是 0=否)"
      rationale: "若 position_min != position_max 代表近 30 分鐘內至少發生過一次換位。"
      depends_on: ["position_min_w30m", "position_max_w30m"]
      expression: "CASE WHEN position_min_w30m = position_max_w30m THEN 0 ELSE 1 END"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0, max: 1 }
      reason_code_category: "ENGAGEMENT"

    # ==== Legacy (passthrough + canonical_id window/derived) ====
    - feature_id: "wager"
      type: "passthrough"
      dtype: "float"
      description: "當筆下注金額（raw）"
    - feature_id: "payout_odds"
      type: "passthrough"
      dtype: "float"
      description: "賠率（raw）"
    - feature_id: "base_ha"
      type: "passthrough"
      dtype: "float"
      description: "莊家優勢（raw）"
    - feature_id: "is_back_bet"
      type: "passthrough"
      dtype: "float"
      description: "是否 back bet（raw）"
    - feature_id: "position_idx"
      type: "passthrough"
      dtype: "float"
      description: "桌位序號（raw）"
    - feature_id: "cum_bets"
      type: "window"
      dtype: "int"
      description: "該玩家至當筆累計下注筆數（canonical_id 內）"
      expression: "COUNT(*)"
      window_frame: "ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0, max: 10000000 }
    - feature_id: "cum_wager"
      type: "window"
      dtype: "float"
      description: "該玩家至當筆累計下注金額（canonical_id 內）"
      expression: "SUM(wager)"
      window_frame: "ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0.0, max: 1000000000000.0 }
    - feature_id: "avg_wager_sofar"
      type: "derived"
      dtype: "float"
      description: "該玩家至當筆平均注額"
      depends_on: ["cum_wager", "cum_bets"]
      expression: "CAST(cum_wager AS DOUBLE) / NULLIF(cum_bets, 0)"
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0.0, max: 1000000000.0 }
    - feature_id: "time_of_day_sin"
      type: "derived"
      dtype: "float"
      description: "一天內分鐘數的 sin 編碼（0–1440）"
      expression: "sin(2 * pi() * (date_part('hour', payout_complete_dtm) * 60 + date_part('minute', payout_complete_dtm)) / 1440)"
      postprocess:
        fill: { strategy: "zero" }
    - feature_id: "time_of_day_cos"
      type: "derived"
      dtype: "float"
      description: "一天內分鐘數的 cos 編碼（0–1440）"
      expression: "cos(2 * pi() * (date_part('hour', payout_complete_dtm) * 60 + date_part('minute', payout_complete_dtm)) / 1440)"
      postprocess:
        fill: { strategy: "zero" }

  active:
    feature_ids: []   # 由訓練流程產生的生產特徵清單寫入

track_human:
  name: "Track Human"
  enabled: true

  candidates:
    - feature_id: "loss_streak"
      type: "python_vectorized"
      dtype: "int"
      description: "連輸計數（WIN 重置；PUSH 是否重置由 config 決定）"
      function_name: "compute_loss_streak_features"
      input_columns: ["canonical_id", "payout_complete_dtm", "bet_id", "status"]
      output_columns: ["loss_streak"]
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0, max: 999 }
      reason_code_category: "LOSS_STREAK"

    - feature_id: "consecutive_non_win_cnt"
      type: "python_vectorized"
      dtype: "int"
      description: "從最近一次 WIN 到現在，連續非 WIN（LOSE+PUSH）筆數"
      function_name: "compute_consecutive_non_win_features"
      input_columns: ["canonical_id", "payout_complete_dtm", "bet_id", "status"]
      output_columns: ["consecutive_non_win_cnt"]
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0, max: 999 }
      reason_code_category: "LOSS_STREAK"

    - feature_id: "minutes_since_run_start"
      type: "python_vectorized"
      dtype: "float"
      description: "距離 run 起點的分鐘數（run 以 gap>=RUN_BREAK_MIN 切分）"
      function_name: "compute_run_boundary_features"
      input_columns: ["canonical_id", "payout_complete_dtm", "bet_id", "wager", "casino_win"]
      output_columns: ["run_id", "minutes_since_run_start", "bets_in_run_so_far", "wager_sum_in_run_so_far", "net_win_in_run_so_far", "net_win_per_bet_in_run"]
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0.0, max: 1000000.0 }

    - feature_id: "bets_in_run_so_far"
      type: "python_vectorized"
      dtype: "int"
      description: "當筆為止同一 run 內下注筆數（1-based）"
      function_name: "compute_run_boundary_features"
      input_columns: ["canonical_id", "payout_complete_dtm", "bet_id", "wager", "casino_win"]
      output_columns: ["run_id", "minutes_since_run_start", "bets_in_run_so_far", "wager_sum_in_run_so_far", "net_win_in_run_so_far", "net_win_per_bet_in_run"]
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0, max: 10000000 }

    - feature_id: "wager_sum_in_run_so_far"
      type: "python_vectorized"
      dtype: "float"
      description: "當筆為止同一 run 內下注金額累計"
      function_name: "compute_run_boundary_features"
      input_columns: ["canonical_id", "payout_complete_dtm", "bet_id", "wager", "casino_win"]
      output_columns: ["run_id", "minutes_since_run_start", "bets_in_run_so_far", "wager_sum_in_run_so_far", "net_win_in_run_so_far", "net_win_per_bet_in_run"]
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: 0.0, max: 1000000000000.0 }

    - feature_id: "net_win_in_run_so_far"
      type: "python_vectorized"
      dtype: "float"
      description: "當筆為止同一 run 內玩家淨損益累計（player_net_win=-casino_win）"
      function_name: "compute_run_boundary_features"
      input_columns: ["canonical_id", "payout_complete_dtm", "bet_id", "wager", "casino_win"]
      output_columns: ["run_id", "minutes_since_run_start", "bets_in_run_so_far", "wager_sum_in_run_so_far", "net_win_in_run_so_far", "net_win_per_bet_in_run"]
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: -1000000000000.0, max: 1000000000000.0 }
      reason_code_category: "LOSS_STREAK"

    - feature_id: "net_win_per_bet_in_run"
      type: "python_vectorized"
      dtype: "float"
      description: "當前 run 每注平均淨損益（run 內累計淨損益/下注筆數）"
      function_name: "compute_run_boundary_features"
      input_columns: ["canonical_id", "payout_complete_dtm", "bet_id", "wager", "casino_win"]
      output_columns: ["run_id", "minutes_since_run_start", "bets_in_run_so_far", "wager_sum_in_run_so_far", "net_win_in_run_so_far", "net_win_per_bet_in_run"]
      postprocess:
        fill: { strategy: "zero" }
        clip: { min: -1000000000.0, max: 1000000000.0 }
      reason_code_category: "LOSS_STREAK"

    - feature_id: "run_duration_vs_personal_avg"
      type: "python_vectorized"
      dtype: "float"
      description: "當前 run 時長相對個人 30 天平均 session 時長"
      function_name: "compute_wave2_personalized_features"
      input_columns: ["minutes_since_run_start", "avg_session_duration_min_30d", "bets_in_run_so_far", "num_bets_sum_30d", "sessions_30d", "bets_cnt_w15m"]
      output_columns: ["run_duration_vs_personal_avg", "bets_in_run_vs_personal_avg", "pace_vs_personal_baseline"]
      screening_eligible: true
      reason_code_category: "BETTING_PACE_DROPPING"

    - feature_id: "bets_in_run_vs_personal_avg"
      type: "python_vectorized"
      dtype: "float"
      description: "當前 run 下注筆數相對個人 30 天平均每次 session 筆數"
      function_name: "compute_wave2_personalized_features"
      input_columns: ["minutes_since_run_start", "avg_session_duration_min_30d", "bets_in_run_so_far", "num_bets_sum_30d", "sessions_30d", "bets_cnt_w15m"]
      output_columns: ["run_duration_vs_personal_avg", "bets_in_run_vs_personal_avg", "pace_vs_personal_baseline"]
      screening_eligible: true
      reason_code_category: "BETTING_PACE_DROPPING"

    - feature_id: "pace_vs_personal_baseline"
      type: "python_vectorized"
      dtype: "float"
      description: "當前 15 分鐘下注頻率相對個人 30 天基準頻率"
      function_name: "compute_wave2_personalized_features"
      input_columns: ["minutes_since_run_start", "avg_session_duration_min_30d", "bets_in_run_so_far", "num_bets_sum_30d", "sessions_30d", "bets_cnt_w15m"]
      output_columns: ["run_duration_vs_personal_avg", "bets_in_run_vs_personal_avg", "pace_vs_personal_baseline"]
      screening_eligible: true
      reason_code_category: "BETTING_PACE_DROPPING"

