# Minimal Phase 2 config (T9). Edit common.* for your machine; CLI --run-id is authoritative.
phase: phase2

common:
  models_root: out/models
  model_version: "20260419-040815-6ec219f"
  state_db_path: local_state/state.db
  prediction_log_db_path: local_state/prediction_log.db
  window:
    start_ts: "2026-03-01T00:00:00+08:00"
    end_ts: "2026-04-01T00:00:00+08:00"
  contract:
    metric: precision_at_recall_1pct
    timezone: Asia/Hong_Kong
    exclude_censored: true

resources:
  max_windows: 1
  max_trials_per_track: 1
  max_parallel_jobs: 1
  backtest_skip_optuna: true
  trainer_use_local_parquet: true

tracks:
  track_a:
    enabled: true
    experiments:
      - exp_id: a_baseline
        overrides: {}
  track_b:
    enabled: true
    experiments:
      - exp_id: b_baseline
        overrides: {}
  track_c:
    enabled: true
    experiments:
      - exp_id: c_baseline
        overrides: {}

gate:
  min_uplift_pp_vs_baseline: 3.0
  max_std_pp_across_windows: 2.5
