# Phase 2 orchestrator config (T9 schema) — copy and edit for your run.
# CLI --run-id is authoritative; optional yaml run_id must match when set.
phase: phase2
# run_id: phase2_20260410

common:
  model_dir: out/models/20260408-173809-e472fd0
  state_db_path: trainer/local_state/state.db
  prediction_log_db_path: trainer/local_state/prediction_log.db
  window:
    start_ts: "2026-04-09T00:00:00+08:00"
    end_ts: "2026-04-15T00:00:00+08:00"
  contract:
    metric: precision_at_recall_1pct
    timezone: Asia/Hong_Kong
    exclude_censored: true

resources:
  max_windows: 3
  max_trials_per_track: 6
  max_parallel_jobs: 1
  backtest_skip_optuna: true

tracks:
  track_a:
    enabled: true
    experiments:
      - exp_id: a_baseline
        overrides: {}
      - exp_id: a_hard_negative_v1
        overrides:
          hard_negative_weight: 2.0
  track_b:
    enabled: true
    experiments:
      - exp_id: b_baseline
        overrides: {}
  track_c:
    enabled: true
    experiments:
      - exp_id: c_baseline
        overrides: {}

gate:
  min_uplift_pp_vs_baseline: 3.0
  max_std_pp_across_windows: 2.5
