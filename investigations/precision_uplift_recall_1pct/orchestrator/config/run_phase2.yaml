# Phase 2 orchestrator config (T9 schema) — copy and edit for your run.
# CLI --run-id is authoritative; optional yaml run_id must match when set.
phase: phase2
# run_id: phase2_20260410

common:
  # Versioned layout: versions root + one path segment (see trainer/core/model_bundle_paths.py).
  # Loads as common.model_dir == "<models_root>/<model_version>".
  # Alternative: omit model_version and set model_dir to the bundle path directly.
  models_root: out/models
  model_version: "20260419-040815-6ec219f"
  state_db_path: local_state/state.db
  prediction_log_db_path: local_state/prediction_log.db
  window:
    start_ts: "2026-03-01T00:00:00+08:00"
    end_ts: "2026-04-01T00:00:00+08:00"
  contract:
    metric: precision_at_recall_1pct
    timezone: Asia/Hong_Kong
    exclude_censored: true

resources:
  max_windows: 3
  max_trials_per_track: 6
  max_parallel_jobs: 1
  backtest_skip_optuna: true
  trainer_use_local_parquet: true
  # Optional (T10 trainer batch): trainer_use_local_parquet: false
  # Optional wall-clock cap per job (seconds); omit for no timeout:
  # phase2_trainer_job_timeout_sec: 7200
  # Optional (T10 shared backtest): wall-clock cap for trainer.backtester subprocess:
  # phase2_backtest_timeout_sec: 7200
  # Optional: override default trainer/out_backtest/backtest_metrics.json after backtest:
  # backtest_metrics_path: trainer/out_backtest/backtest_metrics.json
  #
  # Optional (W1 / field-test objective): repo-relative paths to per-fold metrics JSON
  # (same shape as ``--fold-metrics-json`` for ``trainer.scripts.build_field_test_objective_precondition``).
  # When set, Phase 2 orchestrator builds ``out/precision_uplift_field_test_objective/phase2_<run_id>_...json``
  # before trainer jobs and sets ``FIELD_TEST_OBJECTIVE_PRECONDITION_JSON`` for each subprocess.
  # field_test_objective_fold_metrics_json:
  #   - investigations/precision_uplift_recall_1pct/results/_example/fold_a.json
  #   - investigations/precision_uplift_recall_1pct/results/_example/fold_b.json
  # Or omit the explicit list and use globs (repo-relative; ** requires recursive=True; capped at 32 files):
  # field_test_objective_fold_metrics_globs:
  #   - "investigations/precision_uplift_recall_1pct/results/<run_id>/**/*.json"
  # field_test_precondition_production_neg_pos_ratio: 20   # optional, default 20
  # field_test_precondition_selection_mode: field_test     # optional
  #
  # After --phase2-run-trainer-jobs: orchestrator parses trainer stderr/stdout for
  # "Artifacts saved to …" and fills job_specs.training_metrics_repo_relative when
  # the experiment did not set it in YAML (see runner.infer_training_metrics_repo_relative_from_trainer_logs).
  #
  # Optional CLI --phase2-run-per-job-backtests (after harvest, before shared backtest):
  # runs trainer.backtester per job_spec that has training_metrics_repo_relative; logs
  # under each job's logs/.../<exp_id>/_per_job_backtest/ with --output-dir there so
  # backtest_metrics.json is per-job (shared backtest still writes default/global path).
  #
  # Optional CLI --phase2-fail-on-gate-fail: if evaluate_phase2_gate returns FAIL after
  # phase2_gate_report, exit 9 and mark step failed (reports still written; BLOCKED/PASS
  # do not trigger exit 9).
  # Optional CLI --phase2-fail-on-gate-blocked: BLOCKED -> exit 10, E_PHASE2_GATE_BLOCKED
  # (plan_only runs are usually BLOCKED — use only when you intend CI to fail on BLOCKED).
  #
  # Optional bundle field (for gate std): phase2_pat_series_by_experiment:
  #   track_c: { c0: [0.50, 0.51, 0.505], c1: [...] }  # PAT@1% per window, same scale as previews
  # Compared to gate.max_std_pp_across_windows (pp of sample stdev across windows).
  # If unset and phase2_gate_report runs: collectors.merge_phase2_pat_series_from_shared_and_per_job
  # may build a two-point series [shared PAT@1%, per-job preview] per ok job (MVP bridge until
  # true multi-window series exist); skipped when any manual list already has len>=2.

tracks:
  track_a:
    enabled: true
    experiments:
      - exp_id: a_baseline
        overrides: {}
        # Optional (T10 harvest): repo-relative file or directory containing training_metrics.json
        # training_metrics_repo_relative: out/models/20260408-173809-e472fd0
        # Optional multi-window PAT@1% (0–1) for std gate; populates bundle phase2_pat_series_by_experiment:
        # precision_at_recall_1pct_by_window: [0.50, 0.51, 0.505]
      # T10A: per-experiment trainer CLI (whitelist); non-empty ``overrides`` are rejected at config load.
      - exp_id: a_recent_chunks_v1
        overrides: {}
        trainer_params:
          recent_chunks: 3
  track_b:
    enabled: true
    experiments:
      - exp_id: b_baseline
        overrides: {}
  track_c:
    enabled: true
    experiments:
      - exp_id: c_baseline
        overrides: {}

# Phase 2 Gate（對齊 .cursor/plans/PLAN_precision_uplift_sprint.md §Phase 2；實作 evaluate_phase2_gate）
gate:
  min_uplift_pp_vs_baseline: 3.0 # pp vs YAML-order baseline on each enabled track (per-job previews)
  max_std_pp_across_windows: 2.5 # sample stdev of PAT@1% series (pp); optional phase2_pat_series_by_experiment
