# Example Phase 1 orchestrator config — copy and edit paths for your run.
# Optional (defaults in runner.py if omitted):
#   r1_r6_script: investigations/test_vs_production/checks/run_r1_r6_analysis.py
#   backtest_skip_optuna: true
#   backtest_extra_args: []  # extra CLI tokens for trainer.backtester
#   backtest_metrics_path: trainer/out_backtest/backtest_metrics.json
#   checkpoints:
#     enable_mid_snapshot: true
#     midpoint_ratio: 0.5
#     midpoint_ratios: [0.25, 0.5]  # optional; overrides midpoint_ratio
model_dir: out/models/20260408-173809-e472fd0/
state_db_path: local_state/state.db
prediction_log_db_path: local_state/prediction_log.db

window:
  start_ts: "2026-04-09T00:00:00+08:00"
  end_ts: "2026-04-17T00:00:00+08:00"

# Gate-oriented thresholds (orchestrator/evaluators will use these in later tasks).
thresholds:
  min_hours_preliminary: 48
  min_finalized_alerts_preliminary: 300
  min_finalized_true_positives_preliminary: 30
  min_hours_gate: 72
  min_finalized_alerts_gate: 800
  min_finalized_true_positives_gate: 50
  # Optional: absolute |pat_mid - pat_final| above this → FAIL (default 0.15 in code)
  # gate_pat_abs_tolerance: 0.15
  # Optional (P1 PIT parity MVP — gate reads these in evaluators.evaluate_phase1_gate):
  # pit_parity_mode: WARN_ONLY  # STRICT blocks PASS when parity thresholds fail; WARN_ONLY records metrics only
  # min_scored_at_in_window_ratio: 0.995
  # min_validated_at_non_null_ratio: 0.995
  # max_alert_prediction_gap_abs: 100

# Optional mid/final checkpoint policy for Phase 1.
# Mid snapshot runs from window.start_ts to each interior end_ts (ratio in (0,1)
# and/or wall-clock hours from start). Duplicate end times are deduped and sorted.
checkpoints:
  enable_mid_snapshot: true
  midpoint_ratio: 0.5
  # ratio_midpoints_enabled: false   # optional: only use wallclock_offsets_hours
  # wallclock_offsets_hours: [6, 24]  # e.g. t+6h / t+24h from window.start_ts
  # midpoint_ratios: [0.25, 0.5]

# Optional W1-B2 slice_contract collector policy
# (primary data source is state_db; Parquet/ClickHouse fallback when state_db is infeasible):
# slice_contract:
#   T0: "2026-04-17T00:00:00+08:00"
#   auto_eval_rows_from_prediction_log: true
#   auto_profiles_from_state_db: true
#   profile_table: player_profile
#   profile_parquet_path: data/player_profile.parquet
#   auto_profiles_from_clickhouse: true
#   # clickhouse_source_db: GDP_GMWDS_Raw
#   # clickhouse_profile_table: player_profile
#   # asof_mode: STRICT  # STRICT => missing as_of evidence marks slice_data_incomplete and gate FAIL
#   # slice_contract_version: plan7-sha256:manual-override  # optional override; default auto from PLAN §7 hash
#   # auto_eval_rows_limit: 100000
